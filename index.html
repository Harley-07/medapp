<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio India Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
:root{--bg:#0f1117;--sur:#1a1d27;--card:#20242f;--bor:#2e3347;--acc:#00d4aa;--acc2:#0099ff;--red:#ff4757;--txt:#e8eaf0;--muted:#7a7f9a;--grn:#2ed573;--warn:#ffa502;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:Inter,sans-serif;min-height:100vh;}
header{background:var(--sur);border-bottom:1px solid var(--bor);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;}
.logo img{width:42px;height:42px;border-radius:8px;background:#fff;padding:2px;object-fit:contain;}
.logo h1{font-size:15px;font-weight:700;}
.logo p{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.hdate{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);background:rgba(0,212,170,0.1);padding:5px 10px;border-radius:20px;border:1px solid rgba(0,212,170,0.2);}
.tabs{display:flex;background:var(--sur);border-bottom:1px solid var(--bor);padding:0 16px;}
.tab{padding:12px 16px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}
.bdg{background:var(--red);color:#fff;border-radius:10px;font-size:10px;font-weight:700;padding:1px 5px;margin-left:4px;}
main{padding:16px;max-width:860px;margin:0 auto;}
.sec{display:none;}.sec.active{display:block;}
input,select{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:11px 14px;color:var(--txt);font-size:13px;font-family:inherit;outline:none;transition:border-color 0.2s;width:100%;}
input:focus,select:focus{border-color:var(--acc);}
select option{background:var(--card);}
.row{display:flex;gap:8px;margin-bottom:12px;align-items:center;}
.cats{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;}
.cat{padding:6px 14px;border-radius:20px;border:1px solid var(--bor);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:inherit;}
.cat.on{background:var(--acc);border-color:var(--acc);color:#000;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr);}}
.mcard{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:13px;transition:all 0.2s;position:relative;overflow:hidden;}
.mcard::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));opacity:0;transition:opacity 0.2s;}
.mcard:hover,.mcard.on{border-color:var(--acc);}
.mcard.on{background:rgba(0,212,170,0.04);}
.mcard:hover::before,.mcard.on::before{opacity:1;}
.mname{font-size:12px;font-weight:700;margin-bottom:3px;line-height:1.3;}
.mcat{font-size:10px;color:var(--muted);background:rgba(255,255,255,0.06);padding:2px 7px;border-radius:10px;display:inline-block;margin-bottom:8px;font-family:'JetBrains Mono',monospace;}
.mprice{font-size:13px;font-weight:700;color:var(--acc);font-family:'JetBrains Mono',monospace;margin-bottom:8px;}
.qrow{display:flex;align-items:center;gap:7px;}
.qbtn{width:28px;height:28px;border-radius:7px;border:1px solid var(--bor);background:var(--sur);color:var(--txt);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-weight:700;flex-shrink:0;}
.qbtn:hover{background:var(--acc);border-color:var(--acc);color:#000;}
.qinp{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;width:46px;text-align:center;color:var(--acc);background:var(--sur);border:1px solid var(--bor);border-radius:7px;padding:3px 4px;-moz-appearance:textfield;}
.qinp::-webkit-outer-spin-button,.qinp::-webkit-inner-spin-button{-webkit-appearance:none;}
.qinp:focus{border-color:var(--acc);}
.osh{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;}
.oitems{margin-bottom:14px;}
.oitem{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:11px 14px;display:flex;align-items:center;gap:10px;margin-bottom:8px;position:relative;overflow:hidden;touch-action:pan-y;}
.oitem-del{position:absolute;right:0;top:0;bottom:0;width:72px;background:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;border-radius:0 10px 10px 0;transition:opacity 0.2s;opacity:0;}
.oitem.swipe .oitem-del{opacity:1;}
.oitem-inner{display:flex;align-items:center;gap:10px;width:100%;transition:transform 0.2s;}
.oitem.swipe .oitem-inner{transform:translateX(-72px);}
.oname{flex:1;}
.oname strong{font-size:13px;font-weight:600;display:block;}
.oname span{font-size:11px;color:var(--muted);}
.ototal{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;color:var(--acc);white-space:nowrap;}
.tbar{background:linear-gradient(135deg,rgba(0,212,170,0.1),rgba(0,153,255,0.1));border:1px solid var(--acc);border-radius:12px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.tamt{font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:var(--acc);}
.arow{display:flex;gap:8px;flex-wrap:wrap;}
.btn{padding:10px 16px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;display:inline-flex;align-items:center;gap:6px;}
.bp{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#000;}
.bd{background:rgba(255,71,87,0.15);color:var(--red);border:1px solid rgba(255,71,87,0.3);}
.bd:hover{background:var(--red);color:#fff;}
.bw{background:rgba(255,165,2,0.15);color:var(--warn);border:1px solid rgba(255,165,2,0.3);}
.bw:hover{background:var(--warn);color:#000;}
.bg{background:rgba(46,213,115,0.15);color:var(--grn);border:1px solid rgba(46,213,115,0.3);}
.bg:hover{background:var(--grn);color:#000;}
.bwa{background:rgba(37,211,102,0.15);color:#25d366;border:1px solid rgba(37,211,102,0.3);}
.bwa:hover{background:#25d366;color:#fff;}
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty .ico{font-size:44px;margin-bottom:10px;opacity:0.4;}
.fbox{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:18px;margin-bottom:16px;}
.fbox h3{font-size:13px;color:var(--acc);margin-bottom:12px;font-family:'JetBrains Mono',monospace;}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.fg{display:flex;flex-direction:column;gap:5px;}
.fg label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:0.4px;}
.mli{background:var(--card);border:1px solid var(--bor);border-radius:10px;padding:11px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.delbtn{background:none;border:none;color:var(--red);cursor:pointer;font-size:15px;padding:4px 8px;border-radius:6px;}
.hitem{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color 0.2s;}
.hitem:hover{border-color:var(--acc);}
.hh{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.hcust{font-size:14px;font-weight:700;}
.hdate2{font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace;}
.hmeta{font-size:12px;color:var(--muted);}
.htot{color:var(--acc);font-weight:700;font-family:'JetBrains Mono',monospace;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:500;display:none;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--sur);border-radius:20px 20px 0 0;width:100%;max-width:600px;max-height:88vh;overflow-y:auto;padding:20px;animation:su 0.3s ease;}
@keyframes su{from{transform:translateY(100%);}to{transform:translateY(0);}}
.mhdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.mtitle{font-size:15px;font-weight:700;}
.mclose{background:none;border:none;color:var(--muted);font-size:24px;cursor:pointer;line-height:1;}
.ctbl{width:100%;border-collapse:collapse;margin-bottom:12px;}
.ctbl th{background:var(--card);padding:9px 10px;font-size:11px;color:var(--muted);text-align:left;font-family:'JetBrains Mono',monospace;text-transform:uppercase;}
.ctbl td{padding:9px 10px;font-size:12px;border-bottom:1px solid rgba(46,51,71,0.3);}
.ctot{background:var(--acc);color:#000;border-radius:10px;padding:12px 16px;display:flex;justify-content:space-between;font-weight:700;margin-bottom:14px;}
.mact{display:flex;gap:8px;}
.cdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--card);border:1px solid var(--acc);border-radius:10px;z-index:50;max-height:160px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.cdrop.open{display:block;}
.copt{padding:10px 14px;font-size:13px;cursor:pointer;transition:background 0.15s;}
.copt:hover{background:rgba(0,212,170,0.1);color:var(--acc);}
.savebtn{background:rgba(0,212,170,0.15);border:1px solid rgba(0,212,170,0.3);color:var(--acc);border-radius:10px;padding:0 14px;font-size:18px;cursor:pointer;transition:all 0.2s;}
.savebtn:hover{background:var(--acc);color:#000;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--acc);color:#000;padding:11px 22px;border-radius:30px;font-weight:700;font-size:13px;transition:transform 0.3s;z-index:9999;white-space:nowrap;pointer-events:none;}
.toast.show{transform:translateX(-50%) translateY(0);}
.swh{font-size:10px;color:var(--muted);font-style:italic;}
</style>
</head>

    </div>
    <div class="cats" id="cats"></div>
    <input type="text" id="msearch" placeholder="🔍 Search medicine..." oninput="renderGrid()" style="margin-bottom:14px;">
    <div class="grid" id="mgrid"></div>

    <div class="osh">
      <strong style="font-size:14px;">📋 Order Summary</strong>
      <div style="display:flex;gap:12px;align-items:center;">
        <span class="swh">← swipe to remove</span>
        <span id="ocnt" style="font-size:12px;color:var(--muted);">0 items</span>
      </div>
    </div>
    <div class="oitems" id="oitems"></div>
    <div class="tbar">
      <span style="font-size:13px;color:var(--muted);">Total Amount</span>
      <span class="tamt" id="tamt">₹0.00</span>
    </div>
    <div class="arow">
      <button class="btn bp" onclick="openConfirm()">✅ Confirm Order</button>
      <button class="btn bw" onclick="doPrint()">🖨 Print</button>
      <button class="btn bd" onclick="clearOrd()">🗑 Clear</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="sec" id="t-history">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <strong style="font-size:14px;">📋 Order History</strong>
      <button class="btn bd" style="padding:7px 12px;font-size:12px;" onclick="clearHist()">🗑 Clear All</button>
    </div>
    <div id="hlist"></div>
  </div>

  <!-- MEDICINES -->
  <div class="sec" id="t-meds">
    <div class="fbox">
      <h3>+ New Medicine Add</h3>
      <div class="fgrid">
        <div class="fg"><label>Name</label><input type="text" id="nm" placeholder="Paracetamol 500mg"></div>
        <div class="fg"><label>Category</label>
          <select id="nc"><option>Tablet</option><option>Capsule</option><option>Syrup</option><option>Injection</option><option>Ointment</option><option>Drop</option><option>Other</option></select>
        </div>
      </div>
      <div class="fgrid">
        <div class="fg"><label>Price (₹)</label><input type="number" id="np" placeholder="0.00" min="0" step="0.01"></div>
        <div class="fg"><label>Unit</label><input type="text" id="nu" placeholder="Strip / Box / Bottle"></div>
      </div>
      <button class="btn bp" onclick="addMed()">+ Add Medicine</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Medicine List (<span id="mcount">0</span>)</div>
    <div id="mlist"></div>
  </div>
</main>

<!-- CONFIRM MODAL -->
<div class="overlay" id="cfm">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle">✅ Confirm Order</div>
      <button class="mclose" onclick="closeConfirm()">×</button>
    </div>
    <div id="cfmcont"></div>
    <div class="mact">
      <button class="btn bg" style="flex:1" onclick="finalOrder()">✅ Save</button>
      <button class="btn bw" style="flex:1" onclick="savePDF()">📄 PDF</button>
      <button class="btn bwa" style="flex:1" onclick="sendWA()">📱 WhatsApp</button>
    </div>
  </div>
</div>

<!-- HISTORY DETAIL MODAL -->
<div class="overlay" id="hdm">
  <div class="modal">
    <div class="mhdr">
      <div class="mtitle" id="hdmtitle"></div>
      <button class="mclose" onclick="closeHDM()">×</button>
    </div>
    <div id="hdmcont"></div>
    <div class="mact">
      <button class="btn bg" onclick="reOrder()">🔄 Re-order</button>
      <button class="btn bw" onclick="hPDF()">📄 PDF</button>
      <button class="btn bwa" onclick="hWA()">📱 WhatsApp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var jspdf = window.jspdf;

// ── DATA ──────────────────────────────────────────────────────────
var meds = JSON.parse(localStorage.getItem('bil_meds') || 'null') || [
  {id:1,name:'Paracetamol 500mg',cat:'Tablet',price:18.50,unit:'Strip'},
  {id:2,name:'Amoxicillin 250mg',cat:'Capsule',price:42.00,unit:'Strip'},
  {id:3,name:'Cetirizine 10mg',cat:'Tablet',price:15.00,unit:'Strip'},
  {id:4,name:'Omeprazole 20mg',cat:'Capsule',price:35.00,unit:'Strip'},
  {id:5,name:'Azithromycin 500mg',cat:'Tablet',price:85.00,unit:'Strip'},
  {id:6,name:'Ibuprofen 400mg',cat:'Tablet',price:22.00,unit:'Strip'},
  {id:7,name:'Metformin 500mg',cat:'Tablet',price:28.00,unit:'Strip'},
  {id:8,name:'Atorvastatin 10mg',cat:'Tablet',price:55.00,unit:'Strip'},
  {id:9,name:'Dolo 650mg',cat:'Tablet',price:32.00,unit:'Strip'},
  {id:10,name:'Cough Syrup 100ml',cat:'Syrup',price:68.00,unit:'Bottle'}
];
var custs = JSON.parse(localStorage.getItem('bil_custs') || '[]');
var hist  = JSON.parse(localStorage.getItem('bil_hist')  || '[]');
var cart  = {};
var activeCat = 'All';
var curHist = null;

function sv(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

// ── INIT ──────────────────────────────────────────────────────────
document.getElementById('hdate').textContent = getDate();
renderCats();
renderGrid();
renderOItems();

function getDate(){
  return new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}
function getDT(){
  return new Date().toLocaleString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}

// ── TABS ──────────────────────────────────────────────────────────
function goTab(id){
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.querySelectorAll('.sec').forEach(function(s){ s.classList.remove('active'); });
  var tabs = ['t-order','t-history','t-meds'];
  var idx = tabs.indexOf(id);
  if(idx >= 0) document.querySelectorAll('.tab')[idx].classList.add('active');
  document.getElementById(id).classList.add('active');
  if(id === 't-history') renderHist();
  if(id === 't-meds') renderMList();
}

// ── CUSTOMER ──────────────────────────────────────────────────────
function filterCust(){
  var val = document.getElementById('cname').value.toLowerCase();
  var drop = document.getElementById('cdrop');
  var fil = custs.filter(function(c){ return c.toLowerCase().indexOf(val) >= 0; });
  if(!val || fil.length === 0){ drop.classList.remove('open'); return; }
  drop.innerHTML = fil.map(function(c){
    return '<div class="copt" onclick="pickCust(this.textContent)">' + c + '</div>';
  }).join('');
  drop.classList.add('open');
}
function showCustDrop(){
  var drop = document.getElementById('cdrop');
  if(custs.length === 0) return;
  drop.innerHTML = custs.map(function(c){
    return '<div class="copt" onclick="pickCust(this.textContent)">' + c + '</div>';
  }).join('');
  drop.classList.add('open');
}
function pickCust(n){
  document.getElementById('cname').value = n;
  document.getElementById('cdrop').classList.remove('open');
}
function saveCust(){
  var n = document.getElementById('cname').value.trim();
  if(!n){ toast('Name enter பண்ணுங்க!'); return; }
  if(custs.indexOf(n) < 0){ custs.push(n); sv('bil_custs', custs); toast('"' + n + '" saved!'); }
  else toast('Already saved!');
  document.getElementById('cdrop').classList.remove('open');
}
document.addEventListener('click', function(e){
  if(!e.target.closest || !e.target.closest('[id="cname"]') && !e.target.closest('[id="cdrop"]'))
    document.getElementById('cdrop').classList.remove('open');
});

// ── CATEGORY FILTERS ─────────────────────────────────────────────
function getCats(){
  var cs = [];
  meds.forEach(function(m){ if(cs.indexOf(m.cat) < 0) cs.push(m.cat); });
  return ['All'].concat(cs);
}
function renderCats(){
  document.getElementById('cats').innerHTML = getCats().map(function(c){
    return '<button class="cat' + (c === activeCat ? ' on' : '') + '" onclick="setCat(\'' + c + '\')">' + c + '</button>';
  }).join('');
}
function setCat(c){ activeCat = c; renderCats(); renderGrid(); }

// ── MEDICINE GRID ─────────────────────────────────────────────────
function renderGrid(){
  var s = (document.getElementById('msearch').value || '').toLowerCase();
  var list = meds.filter(function(m){
    return (m.name.toLowerCase().indexOf(s) >= 0 || m.cat.toLowerCase().indexOf(s) >= 0)
      && (activeCat === 'All' || m.cat === activeCat);
  });
  document.getElementById('mgrid').innerHTML = list.map(function(m){
    var q = cart[m.id] || 0;
    return '<div class="mcard' + (q > 0 ? ' on' : '') + '" id="mc' + m.id + '">'
      + '<div class="mname">' + m.name + '</div>'
      + '<div class="mcat">' + m.cat + '</div>'
      + '<div class="mprice">₹' + parseFloat(m.price).toFixed(2) + ' / ' + m.unit + '</div>'
      + '<div class="qrow">'
      + '<button class="qbtn" onclick="adjQ(' + m.id + ',-1)">&#8722;</button>'
      + '<input type="number" class="qinp" id="qi' + m.id + '" value="' + q + '" min="0" onchange="setQ(' + m.id + ',this.value)" oninput="setQ(' + m.id + ',this.value)">'
      + '<button class="qbtn" onclick="adjQ(' + m.id + ',1)">+</button>'
      + '</div></div>';
  }).join('');
}
function adjQ(id, d){
  var cur = cart[id] || 0;
  var nq = Math.max(0, cur + d);
  applyQ(id, nq);
  var el = document.getElementById('qi' + id);
  if(el) el.value = nq;
}
function setQ(id, v){
  applyQ(id, Math.max(0, parseInt(v) || 0));
}
function applyQ(id, nq){
  if(nq === 0) delete cart[id]; else cart[id] = nq;
  var c = document.getElementById('mc' + id);
  if(c) c.className = 'mcard' + (nq > 0 ? ' on' : '');
  updBadge();
  renderOItems();
}
function updBadge(){
  var t = Object.values(cart).reduce(function(a,b){ return a+b; }, 0);
  var b = document.getElementById('bdg');
  b.textContent = t; b.style.display = t > 0 ? 'inline' : 'none';
}

// ── ORDER ITEMS ───────────────────────────────────────────────────
function getItems(){
  return Object.keys(cart).map(function(id){
    var m = meds.find(function(x){ return x.id == id; });
    if(!m) return null;
    var q = cart[id];
    return {id:m.id, name:m.name, cat:m.cat, price:m.price, unit:m.unit, qty:q, total:m.price*q};
  }).filter(Boolean);
}
function renderOItems(){
  var items = getItems();
  var grand = items.reduce(function(s,i){ return s+i.total; }, 0);
  document.getElementById('ocnt').textContent = items.length + ' items';
  document.getElementById('tamt').textContent = '₹' + grand.toFixed(2);
  if(items.length === 0){
    document.getElementById('oitems').innerHTML = '<div class="empty"><div class="ico">&#128722;</div><p>Medicines add pann</p></div>';
    return;
  }
  document.getElementById('oitems').innerHTML = items.map(function(item){
    return '<div class="oitem" id="oi' + item.id + '" data-id="' + item.id + '">'
      + '<div class="oitem-del">&#128465;</div>'
      + '<div class="oitem-inner">'
      + '<div class="oname"><strong>' + item.name + '</strong><span>' + item.qty + ' ' + item.unit + ' &#215; ₹' + parseFloat(item.price).toFixed(2) + '</span></div>'
      + '<div class="ototal">₹' + item.total.toFixed(2) + '</div>'
      + '</div></div>';
  }).join('');
  items.forEach(function(item){ initSwipe(item.id); });
}

// ── SWIPE TO DELETE ───────────────────────────────────────────────
var sw = {};
function initSwipe(id){
  var el = document.getElementById('oi' + id);
  if(!el) return;
  el.addEventListener('touchstart', function(e){ sw[id] = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', function(e){
    if(sw[id] === undefined) return;
    var dx = sw[id] - e.changedTouches[0].clientX;
    if(dx > 60) delItem(id);
    delete sw[id];
  });
  el.addEventListener('mousedown', function(e){ sw[id] = e.clientX; });
  el.addEventListener('mouseup', function(e){
    if(sw[id] === undefined) return;
    var dx = sw[id] - e.clientX;
    if(dx > 60) delItem(id);
    delete sw[id];
  });
}
function delItem(id){
  delete cart[id];
  var el = document.getElementById('qi' + id);
  if(el) el.value = 0;
  var c = document.getElementById('mc' + id);
  if(c) c.className = 'mcard';
  updBadge(); renderOItems();
}

// ── PRINT ─────────────────────────────────────────────────────────
function doPrint(){ window.print(); }

// ── CONFIRM MODAL ─────────────────────────────────────────────────
var pendingOrder = null;
function openConfirm(){
  var items = getItems();
  if(items.length === 0){ toast('Order empty!'); return; }
  var cust = document.getElementById('cname').value || 'Customer';
  var grand = items.reduce(function(s,i){ return s+i.total; }, 0);
  pendingOrder = {id:Date.now(), customer:cust, date:getDT(), items:items, grand:grand};
  var rows = items.map(function(i){
    return '<tr><td>' + i.name + '</td><td>' + i.qty + ' ' + i.unit + '</td>'
      + '<td style="color:var(--acc);font-family:JetBrains Mono,monospace;font-weight:700">₹' + i.total.toFixed(2) + '</td></tr>';
  }).join('');
  document.getElementById('cfmcont').innerHTML =
    '<p style="font-size:13px;color:var(--muted);margin-bottom:12px;">Customer: <strong style=\"color:var(--txt)\">' + cust + '</strong> &nbsp;|&nbsp; ' + getDate() + '</p>'
    + '<table class="ctbl"><thead><tr><th>Medicine</th><th>Qty</th><th>Total</th></tr></thead><tbody>' + rows + '</tbody></table>'
    + '<div class="ctot"><span>Grand Total</span><span>₹' + grand.toFixed(2) + '</span></div>';
  document.getElementById('cfm').classList.add('open');
}
function closeConfirm(){ document.getElementById('cfm').classList.remove('open'); }

function saveHist(order){
  hist.unshift(order);
  sv('bil_hist', hist);
}
function finalOrder(){
  if(!pendingOrder) return;
  saveHist(pendingOrder);
  closeConfirm(); clearOrd(true);
  toast('Order saved!');
}
function savePDF(){
  if(!pendingOrder) return;
  saveHist(pendingOrder);
  makePDF(pendingOrder);
  closeConfirm(); clearOrd(true);
}
function sendWA(){
  if(!pendingOrder) return;
  saveHist(pendingOrder);
  var txt = waText(pendingOrder);
  closeConfirm(); clearOrd(true);
  window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
}

// ── PDF ───────────────────────────────────────────────────────────
function makePDF(order){
  var doc = new jspdf.jsPDF();
  var cust = order.customer;
  var date = order.date;
  var items = order.items;
  var grand = order.grand;

  doc.setFillColor(15,17,23);
  doc.rect(0,0,210,36,'F');
  doc.setTextColor(0,212,170);
  doc.setFontSize(16); doc.setFont('helvetica','bold');
  doc.text('Bio India Labs', 14, 14);
  doc.setFontSize(8); doc.setTextColor(160,165,180);
  doc.text('Wholesale Medicine Orders', 14, 22);
  doc.setTextColor(200,200,200);
  doc.text('Date: ' + date, 14, 30);
  doc.text('Customer: ' + cust, 110, 30);

  var y = 46;
  doc.setFillColor(26,29,39); doc.rect(10,y-5,190,10,'F');
  doc.setTextColor(120,127,154); doc.setFontSize(8); doc.setFont('helvetica','bold');
  doc.text('#',14,y+1); doc.text('Medicine',24,y+1);
  doc.text('Qty',110,y+1); doc.text('Unit Price',135,y+1); doc.text('Total',172,y+1);
  y += 11;

  items.forEach(function(item, i){
    if(y > 270){ doc.addPage(); y = 20; }
    if(i % 2 === 0){ doc.setFillColor(32,36,47); doc.rect(10,y-4,190,9,'F'); }
    doc.setTextColor(200,210,220); doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.text(String(i+1), 14, y+2);
    doc.text(item.name.substring(0,32), 24, y+2);
    doc.text(item.qty + ' ' + item.unit, 110, y+2);
    doc.text('Rs.' + parseFloat(item.price).toFixed(2), 135, y+2);
    doc.setTextColor(0,212,170); doc.setFont('helvetica','bold');
    doc.text('Rs.' + item.total.toFixed(2), 172, y+2);
    y += 10;
  });

  y += 6;
  doc.setFillColor(0,212,170); doc.rect(10,y,190,14,'F');
  doc.setTextColor(0,0,0); doc.setFontSize(12); doc.setFont('helvetica','bold');
  doc.text('TOTAL:', 14, y+9);
  doc.text('Rs.' + grand.toFixed(2), 155, y+9);

  doc.save('BIL_Order_' + cust + '_' + getDate().replace(/ /g,'_') + '.pdf');
  toast('PDF saving...');
}

function waText(order){
  var msg = '*Bio India Labs*\n*Order Summary*\n';
  msg += 'Customer: ' + order.customer + '\n';
  msg += 'Date: ' + order.date + '\n';
  msg += '----------------------------\n';
  order.items.forEach(function(item, i){
    msg += (i+1) + '. ' + item.name + '\n';
    msg += '   ' + item.qty + ' ' + item.unit + ' x Rs.' + parseFloat(item.price).toFixed(2) + ' = *Rs.' + item.total.toFixed(2) + '*\n';
  });
  msg += '----------------------------\n';
  msg += '*Total: Rs.' + order.grand.toFixed(2) + '*';
  return msg;
}

// ── CLEAR ─────────────────────────────────────────────────────────
function clearOrd(silent){
  if(!silent && !confirm('Order clear pannalamaa?')) return;
  cart = {};
  document.getElementById('cname').value = '';
  renderGrid(); renderOItems(); updBadge();
  if(!silent) toast('Cleared!');
}

// ── HISTORY ───────────────────────────────────────────────────────
function renderHist(){
  var el = document.getElementById('hlist');
  if(hist.length === 0){
    el.innerHTML = '<div class="empty"><div class="ico">&#128203;</div><p>History illai</p></div>';
    return;
  }
  el.innerHTML = hist.map(function(o){
    return '<div class="hitem" onclick="openHDM(' + o.id + ')">'
      + '<div class="hh"><span class="hcust">&#128100; ' + o.customer + '</span><span class="hdate2">' + o.date + '</span></div>'
      + '<div class="hmeta">' + o.items.length + ' items &nbsp; <span class="htot">₹' + o.grand.toFixed(2) + '</span></div>'
      + '</div>';
  }).join('');
}
function openHDM(id){
  curHist = hist.find(function(o){ return o.id === id; });
  if(!curHist) return;
  document.getElementById('hdmtitle').textContent = curHist.customer + ' — ' + curHist.date;
  var rows = curHist.items.map(function(i){
    return '<tr><td>' + i.name + '</td><td>' + i.qty + ' ' + i.unit + '</td>'
      + '<td style="color:var(--acc);font-family:JetBrains Mono,monospace;font-weight:700">₹' + i.total.toFixed(2) + '</td></tr>';
  }).join('');
  document.getElementById('hdmcont').innerHTML =
    '<table class="ctbl" style="margin-bottom:12px"><thead><tr><th>Medicine</th><th>Qty</th><th>Total</th></tr></thead><tbody>'
    + rows + '</tbody></table>'
    + '<div class="ctot"><span>Total</span><span>₹' + curHist.grand.toFixed(2) + '</span></div>';
  document.getElementById('hdm').classList.add('open');
}
function closeHDM(){ document.getElementById('hdm').classList.remove('open'); }
function reOrder(){
  if(!curHist) return;
  cart = {};
  curHist.items.forEach(function(item){
    var m = meds.find(function(x){ return x.name === item.name; });
    if(m) cart[m.id] = item.qty;
  });
  document.getElementById('cname').value = curHist.customer;
  closeHDM(); goTab('t-order');
  renderGrid(); renderOItems(); updBadge();
  toast('Order loaded!');
}
function hPDF(){ if(curHist) makePDF(curHist); }
function hWA(){
  if(!curHist) return;
  window.open('https://wa.me/?text=' + encodeURIComponent(waText(curHist)), '_blank');
}
function clearHist(){
  if(!confirm('All history delete pannalamaa?')) return;
  hist = []; sv('bil_hist', []);
  renderHist(); toast('Cleared!');
}

// ── MEDICINES ─────────────────────────────────────────────────────
function addMed(){
  var n = document.getElementById('nm').value.trim();
  var c = document.getElementById('nc').value;
  var p = parseFloat(document.getElementById('np').value);
  var u = document.getElementById('nu').value.trim() || 'Strip';
  if(!n || isNaN(p)){ toast('Name & Price kodungal'); return; }
  meds.push({id:Date.now(), name:n, cat:c, price:p, unit:u});
  sv('bil_meds', meds);
  document.getElementById('nm').value = '';
  document.getElementById('np').value = '';
  document.getElementById('nu').value = '';
  renderMList(); renderGrid(); renderCats();
  toast(n + ' added!');
}
function delMed(id){
  if(!confirm('Delete pannalamaa?')) return;
  meds = meds.filter(function(m){ return m.id !== id; });
  delete cart[id];
  sv('bil_meds', meds);
  renderMList(); renderGrid(); renderCats(); renderOItems(); updBadge();
  toast('Deleted!');
}
function renderMList(){
  document.getElementById('mcount').textContent = meds.length;
  document.getElementById('mlist').innerHTML = meds.map(function(m){
    return '<div class="mli"><div style="flex:1"><strong style="font-size:13px;">' + m.name + '</strong>'
      + '<div style="font-size:11px;color:var(--muted);margin-top:2px;">' + m.cat + ' &middot; ₹' + parseFloat(m.price).toFixed(2) + ' / ' + m.unit + '</div></div>'
      + '<button class="delbtn" onclick="delMed(' + m.id + ')">&#128465;</button></div>';
  }).join('');
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}
</script>
</body>
</html>
